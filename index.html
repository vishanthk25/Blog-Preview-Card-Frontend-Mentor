<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
        <title>
            Blog Preview Card
        </title>
        <style>
            * {
                margin:0;
                padding:0;
            }
            body{
                background-color:hsl(47, 88%, 63%);
                display:flex;
                justify-content:center;
                align-items:center;
                min-height:100vh;
                font-size:1rem;
                font-family:"Figtree", cursive, sans-serif;
                color:hsl(0, 0%, 42%);
                font-weight:500;
            }
            .container{
                background-color:hsl(0, 0%, 100%);
                display:flex;
                flex-direction:column;
                align-items:flex-start;
                box-sizing: border-box;
                padding:25px;
                width:335px;
                max-width:calc(100% - 50px);
                border:1px solid black;
                border-radius:12px;
                box-shadow:6px 6px 0px black;
            }
            .design{
                width:100%;
                border-radius:10px;
            }
            .learning{
                margin-top:15px;
                background-color:hsl(47, 88%, 63%);
                color:hsl(0, 0%, 7%);
                padding:5px 10px;
                border-radius:4px;
                font-weight:800;
            }
            .date{
                margin-top:15px;
                color:hsl(0, 0%, 7%);
            }
            .title{
                color:hsl(0, 0%, 7%);
                margin-top:15px;
                font-weight:800;
                font-size:1.25rem;
                padding:0;
                cursor:pointer;
                transition: color 0.15s;
            }
            .title:active{
                color:hsl(47, 88%, 63%);
            }
            .greg{
                width:30px;
            }
            .name{
                font-weight:800;
                color:hsl(0, 0%, 7%);
            }
            .content{
                margin-top:15px;
                line-height: 1.2;
            }
            .grid{
                margin-top:15px;
                display:grid;
                grid-template-columns: 30px 1fr;
                column-gap:8px;
                align-items:center;
            }
        </style>
    </head>
    <body>
        <main class="container">
            <img src="assets/images/illustration-article.svg" class="design" alt="Design">
            <p class="learning">Learning</p>
            <p class="date">Published 21 Dec 2023</p>
            <p class="title">HTML and CSS foundations</p>
            <p class="content">
                These languages are the backbone of every website, defining structure, content, and presentation.
            </p>
            <div class="grid">
                <img src="assets/images/image-avatar.webp" class="greg" alt="Profile picture">
                <p class="name">Greg Hooper</p>
            </div>
        </main>
    </body>
</html>
